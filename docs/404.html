<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - markweb docs</title>
    <link rel="stylesheet" href="/base.css">
    <link rel="stylesheet" href="/site.css">
    <script>(function(){var s=JSON.parse(localStorage.getItem('markweb-docs-state')||'{}'),t=s.theme,c=s.scheme,h=document.documentElement;h.className='preload '+(t||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'))+(c&&c!=='crimson'?' scheme-'+c:'');})()</script>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100dvh;">
    <div style="text-align:center;padding:2rem;">
        <h1 style="font-size:4rem;margin-bottom:0.5rem;color:var(--accent);">404</h1>
        <p style="font-size:1.25rem;color:var(--fg-secondary);margin-bottom:2rem;">Page not found</p>
        <a href="/" class="btn">Back to docs</a>
    </div>
    <script>requestAnimationFrame(()=>document.documentElement.classList.remove('preload'));</script>
</body>
</html>
