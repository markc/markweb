<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>markweb docs</title>
    <meta name="description" content="markweb — Unified Laravel 12 + Inertia 2 + React 19 platform documentation">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="site.css">
    <script>(function(){var s=JSON.parse(localStorage.getItem('markweb-docs-state')||'{}'),t=s.theme,c=s.scheme,h=document.documentElement;h.className='preload '+(t||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'))+(c&&c!=='crimson'?' scheme-'+c:'');})()</script>
</head>
<body>

<!-- Glass hamburger toggles -->
<button class="menu-toggle menu-toggle-left" data-sidebar="left" aria-label="Toggle navigation">&#9776;</button>
<button class="menu-toggle menu-toggle-right" data-sidebar="right" aria-label="Toggle settings">&#9881;</button>

<!-- TopNav -->
<nav class="topnav">

</nav>

<!-- Left Sidebar: 2-panel carousel -->

            <div class="carousel-dots">

        </div>
        <button class="pin-toggle" data-sidebar="left" title="Pin sidebar">&#128204;</button>
    </div>
    <div class="carousel-viewport">
        <div class="carousel-track">
            <!-- L1: Documentation Nav -->
            <div class="carousel-panel">

                    <nav><div>

                        <a href="#frontend.md" data-path="frontend.md">&#127912; Frontend & DCS</a>
                    </div></nav>
                </div>
                <div class="sidebar-group">
                    <div class="sidebar-group-title">&#9889; Features</div>

                    </div></nav>
                </div>
            </div>

            <div class="carousel-panel">
                <nav>
                    <a href="markweb-collaborative-design.html" target="_blank" rel="noopener">&#127912; Collaborative Design</a>
                    <a href="websocket-wireguard-markweb.html" target="_blank" rel="noopener">&#128274; WebSocket over WireGuard</a>
                    <a href="websocket-topologies.html" target="_blank" rel="noopener">&#128375; WebSocket Topologies</a>
                </nav>
            </div>
        </div>
    </div>
</aside>

<!-- Right Sidebar: 1-panel (Theme) -->
<aside class="sidebar sidebar-right">
    <div class="carousel-header">
        <div class="carousel-nav">
            <div class="carousel-dots">
                <button class="carousel-dot active" data-index="0" aria-label="Theme"></button>
            </div>
        </div>
        <button class="pin-toggle" data-sidebar="right" title="Pin sidebar">&#128204;</button>
    </div>
    <div class="carousel-viewport">
        <div class="carousel-track">
            <!-- R1: Theme -->
            <div class="carousel-panel">
                <nav>
                    <button class="scheme-btn" data-scheme="crimson">
                        <span class="scheme-swatch" style="background: oklch(50.5% 0.197 30);"></span> Crimson

                        <span class="scheme-swatch" style="background: oklch(45% 0.05 60);"></span> Stone
